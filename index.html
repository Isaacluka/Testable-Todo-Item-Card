<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <title>Testable To-Do Item Card</title>
</head>
<body>
    <div class="content">
        <header>
            <h1>Task Focused</h1>
            <p>Manage your high-priority items with architectural precision.</p>
        </header>
        <article class="cardComponent" data-testid="test-todo-card">
            <div class="progressBar"></div>

            <div class="cardContent">     
                <!-- Checkbox -->
                <div class="checkboxDiv">
                    <label class="checkbox">
                        <input type="checkbox" class="checkbox-input" data-testid="test-todo-complete-toggle">

                        <div class="checkbox-box">
                            <span class="check-icon material-symbols-outlined">check</span>
                        </div>
                    </label>
                </div>

                <div>
                    <div class="topFlex">
                        <h2>Finalize Project Proposal</h2>
        
                        <div class="topButtons">
                            <button aria-label="Edit task" data-testid="test-todo-edit-button"><span class="material-symbols-outlined">edit</span></button>
                            <button aria-label="Delete task" data-testid="test-todo-delete-button"><span class="material-symbols-outlined">delete</span></button>
                        </div>
                    </div>
                
                    <p class="description" data-testid="test-todo-description">Review the final draft with the stakeholders and submit for approval.</p>

                    <div>
                        <span class= "priority" data-testid="test-todo-priority">
                            <span class="material-symbols-outlined">priority_high</span>
                            High
                        </span>
                        <span class="px-3 py-1 bg-surface-container-highest text-on-surface-variant text-[10px] font-bold uppercase tracking-wider rounded-full" data-testid="test-todo-status">
                            <!-- Populated via CSS ::after based on checkbox state -->
                        </span>
                    </div>
                    <div class="pt-4 flex flex-col gap-2 border-t border-outline-variant/10">
                        <div class="flex items-center gap-2 text-on-surface-variant">
                            <span class="material-symbols-outlined text-sm">calendar_today</span>
                            <time class="text-sm font-medium" data-testid="test-todo-due-date" datetime="2026-03-01">Due Mar 1, 2026</time>
                            <span class="text-xs text-outline">•</span>
                            <span class="text-sm font-semibold text-secondary" data-testid="test-todo-time-remaining">Due in 3 days</span>
                        </div>
                        <ul class="flex flex-wrap gap-2 pt-2" data-testid="test-todo-tags">
                            <li class="px-3 py-1 bg-primary-fixed text-on-primary-fixed-variant text-[10px] font-bold uppercase tracking-wider rounded-md" data-testid="test-todo-tag-work">Work</li>
                            <li class="px-3 py-1 bg-secondary-fixed text-on-secondary-fixed-variant text-[10px] font-bold uppercase tracking-wider rounded-md" data-testid="test-todo-tag-urgent">Urgent</li>
                        </ul>
                    </div>
                    </div>
            </div>

        </article>
        
    </div>
    
</body>
<script src="script.js"></script>
<script type="module" src="https://unpkg.com/@material/web/all.js"></script>
</html>
