<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <title>Testable To-Do Item Card</title>
</head>
<body>
    <div class="content">
        <header>
            <h1>Task Focused</h1>
            <p>Manage your high-priority items with architectural precision.</p>
        </header>
        <article class="cardComponent" data-testid="test-todo-card">
            <div class="progressBar"></div>

            <div class="cardContent">     
                <!-- Checkbox -->
                <div class="checkboxDiv">
                    <label class="checkbox">
                        <input type="checkbox" id="checkbox-input" class="checkbox-input" data-testid="test-todo-complete-toggle">

                        <div class="checkbox-box">
                            <span class="check-icon material-symbols-outlined">check</span>
                        </div>
                    </label>
                </div>

                <div>
                    <div class="topFlex">
                        <h2>Submit HNG Stage 0 Project</h2>
        
                        <div class="topButtons">
                            <button aria-label="Edit task" data-testid="test-todo-edit-button"><span class="material-symbols-outlined">edit</span></button>
                            <button class="delete" aria-label="Delete task" data-testid="test-todo-delete-button"><span class="material-symbols-outlined">delete</span></button>
                        </div>
                    </div>
                
                    <p class="description" data-testid="test-todo-description">Build a clean, modern Todo/Task Card component.</p>

                    <div class="priorityDiv">
                        <span class="priority" data-testid="test-todo-priority">
                            <span class="material-symbols-outlined">priority_high</span>
                            High
                        </span>
                        <span class="status" id="status" data-testid="test-todo-status">
                            Pending
                        </span>
                    </div>
                    <div class=" dateDiv">
                        <div class=" dateInfo">
                            <span class="material-symbols-outlined">calendar_today</span>
                            <time class="dueDate" id="dueDate" data-testid="test-todo-due-date" dateTime="2026-04-16">Due April 16, 2026</time>
                            <span class="dot">•</span>
                            <span class="countDown" id="countDown" data-testid="test-todo-time-remaining"></span>
                        </div>
                        <ul data-testid="test-todo-tags">
                            <li class="work" data-testid="test-todo-tag-work">Work</li>
                            <li class="urgent" data-testid="test-todo-tag-urgent">Urgent</li>
                        </ul>
                    </div>
                    </div>
            </div>

        </article>

        <div class="listEnd">
            <span class="dash"></span>
            <span class="end">End of View</span>
            <span class=" dash"></span>
        </div>
        
    </div>
    
</body>
<script src="script.js"></script>
<script type="module" src="https://unpkg.com/@material/web/all.js"></script>
</html>
