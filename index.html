<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

    <title>Testable To-Do Item Card</title>
</head>
<body>
    <div class="content">
        <header>
            <h1>Task Focused</h1>
            <p>Manage your high-priority items with architectural precision.</p>
        </header>
        <article class="cardComponent" data-testid="test-todo-card">
            <div id="progressBar" class="progressBar">
            </div>

            <div class="cardContent">     
                <!-- Checkbox -->
                <div class="checkboxDiv">
                    <label class="checkbox">
                        <input type="checkbox" id="checkbox-input" class="checkbox-input" aria-label="Complete task" data-testid="test-todo-complete-toggle">

                        <div class="checkbox-box" tabindex="0">
                            <span class="check-icon material-symbols-outlined" aria-label="Complete task">check</span>
                        </div>
                    </label>
                </div>

                <div>
                    <div class="topFlex">
                        <h2 data-testid="test-todo-title">Submit HNG Stage 0 Project</h2>
        
                        <div class="topButtons">
                            <button aria-label="Edit task" class="edit" data-testid="test-todo-edit-button"><span class="material-symbols-outlined">edit</span></button>
                            <button class="delete" aria-label="Delete task" data-testid="test-todo-delete-button"><span class="material-symbols-outlined">delete</span></button>
                        </div>
                    </div>
                
                    <p class="description" data-testid="test-todo-description">Build a clean, modern Todo/Task Card component.</p>

                    <div class="priorityDiv">
                        <span class="priority" aria-label="Priority" data-testid="test-todo-priority">
                            <span class="material-symbols-outlined">priority_high</span>
                            High
                        </span>
                        <span class="status" id="status" aria-label="Status" data-testid="test-todo-status">
                            Pending
                        </span>
                    </div>
                    <div class=" dateDiv">
                        <div class=" dateInfo">
                            <span class="material-symbols-outlined">calendar_today</span>
                            <time class="dueDate" id="dueDate" data-testid="test-todo-due-date" dateTime="2026-04-16">Due April 16, 2026</time>
                            <span class="dot">•</span>
                            <span class="countDown" id="countDown" data-testid="test-todo-time-remaining"></span>
                        </div>
                        <ul role="list" data-testid="test-todo-tags">
                            <li class="work" data-testid="test-todo-tag-work">Work</li>
                            <li class="urgent" data-testid="test-todo-tag-urgent">Urgent</li>
                        </ul>
                    </div>
                    </div>
            </div>

        </article>
