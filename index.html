<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Testable To-Do Item Card</title>
</head>
<body>
    <div class="content">
        <header>
            <h1>Task Focused</h1>
            <p>Manage your high-priority items with architectural precision.</p>
        </header>
        <article class="cardComponent" data-testid="test-todo-card">
            <div class="progressBar"></div>

            <div class="cardContent">     
                <!-- Checkbox -->
                <div>
                    <label for="">
                    <input type="checkbox" data-testid="test-todo-complete-toggle">
                    </label>
                </div>
                <div>
                    <h2>Finalize Project Proposal</h2>
                </div>
                <div>
                    <button aria-label="Edit task" data-testid="test-todo-edit-button">Edit</button>
                    <button aria-label="Delete task" data-testid="test-todo-delete-button">Delete</button>

                </div>

             </div>
        </article>
    </div>
    
</body>
<script src="script.js"></script>
</html>
